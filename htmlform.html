<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="htmlform.css">
</head>
<body>

<div class="form-container">
    <h2>Registration Form</h2>
    <form>
        <div class="form-group">
            <label>First Name :</label>
            <input type="text" placeholder="Enter First Name">
        </div>

        <div class="form-group">
            <label>Last Name :</label>
            <input type="text" placeholder="Enter Last Name">
        </div>

        <div class="form-group">
            <label>Email :</label>
            <input type="email" placeholder="Enter Email Address">
        </div>

        <div class="form-group">
            <label>Password :</label>
            <input type="password">
        </div>

        <div class="form-group">
            <label>Gender :</label>
            <div class="options">
                Male <input type="radio" name="gender">
                Female <input type="radio" name="gender">
                Other <input type="radio" name="gender">
            </div>
        </div>

        <div class="form-group">
            <label>Age :</label>
            <input type="number">
        </div>

        <div class="form-group">
            <label>Preferences :</label>
            <div class="options">
                Acrylic Painting <input type="checkbox">
                Oil Painting <input type="checkbox">
                Water Color Painting <input type="checkbox">
            </div>
        </div>

        <div class="form-group">
            <label>Occupation :</label>
            <select>
                <option>Student</option>
                <option>Professional</option>
                <option>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Bio :</label>
            <textarea rows="4" placeholder="Share few lines about yourself..."></textarea>
        </div>

        <div class="button-group">
            <button type="reset">RESET</button>
            <button type="submit">SUBMIT</button>
        </div>
    </form>
</div>

</body>
</html>
